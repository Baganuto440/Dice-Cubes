<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice & Cubes - Загрузка</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="splash-screen">
        <div class="splash-content">
            
            <div class="cube-container">
                <div class="cube">
                    <div class="face face-front">⚔️</div>
                    <div class="face face-back">🐉</div>
                    <div class="face face-right">🎲</div>
                    <div class="face face-left">🗡️</div>
                    <div class="face face-top">✨</div>
                    <div class="face face-bottom">🏆</div>
                </div>
            </div>

            <h1 class="brand-title">DICE &amp; CUBES</h1>
            <p class="brand-subtitle">Ваш идеальный бросок начинается здесь</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="loading-text" id="loadingText">Загрузка... 0%</p>
        </div>
    </div>

    <div id="main-content">
        <div class="main-container">
            <h1>🏰 Добро пожаловать в магазин!</h1>
            <p>Здесь будут ваши кубы, книги и приключения.</p>
            <button class="btn-primary">Начать игру</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
